name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

  maven-package:
    name: Maven Package
    runs-on: ubuntu-latest
    needs: maven-test
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build packages
        run: mvn -B package

      - name: Upload Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lypi-maven-artifacts
          path: |
            **/target/*.jar
            !**/target/original-*.jar
