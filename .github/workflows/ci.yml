name: CI

on:
  pull_request:
    branches:
      - dev
      - master
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maven-verify:
    name: Maven Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Verify Maven reactor
        run: mvn -B -ntp verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*"
          if-no-files-found: error
          retention-days: 14

  script-lint:
    name: Script and Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

      - name: Lint GitHub Actions workflows
        uses: reviewdog/action-actionlint@v1

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - maven-verify
      - script-lint
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build boot package
        run: mvn -B -ntp -DskipTests package

      - name: Smoke test boot jar
        run: |
          java -jar lypi-boot/target/lypi-boot-0.0.1-SNAPSHOT.jar \
            --lypi.runtime.cwd="${RUNNER_TEMP}/lypi-ci-smoke" \
            --lypi.runtime.session-id=ci-smoke \
            --lypi.runtime.transport=headless

      - name: Upload Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lypi-maven-artifacts
          path: |
            **/target/*.jar
            !**/target/*.jar.original
          if-no-files-found: error
          retention-days: 14
